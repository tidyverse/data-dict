name: Update examples

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  update-examples:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Build validator
        run: cargo build -p data-dict-cli --release

      - name: Download examples
        run: Rscript download-examples.R

      - name: Validate examples
        run: |
          status=0
          for f in site/examples/*.yaml; do
            echo "::group::Validating $f"
            if ! ./target/release/data-dict validate-schema "$f"; then
              status=1
            fi
            echo "::endgroup::"
          done
          if [ "$status" -ne 0 ]; then
            echo "::error::One or more examples failed validation; not committing."
            exit 1
          fi

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/examples/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            changed=$(git diff --cached --name-only | sed 's|site/examples/||;s|\.yaml||' | paste -sd ', ')
            git commit -m "Update examples: ${changed}"
            git push
          fi

# expected: DD002
# The relationship references `category` but that table doesn't exist; the
# defined table is `food_category`. DD003 would also fire on `category.id`
# but DD002 should be present.

$version: "0.1.0"

tables:
  food:
    description: Foods.
    source:
      parquet: food.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        description: Food id.
      - name: food_category_id
        type: number(id)
        constraints: [foreign_key]
        description: Category id.

  food_category:
    description: Food categories.
    source:
      parquet: food_category.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        description: Category id.

relationships:
  - description: Each food belongs to a category.
    cardinality: many-to-one
    join: food.food_category_id = category.id

# expected: DD006
# `cardinality: many-to-one` requires the right-side join column to be
# `primary_key` or `unique`. Here `account.account_id` is `required` but
# neither unique nor PK. No `foreign_key` constraints are set so DD001 does
# not fire alongside this one.

$version: "0.1.0"

tables:
  transaction:
    description: Transactions.
    source:
      parquet: transaction.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        description: Transaction id.
      - name: account_id
        type: number(id)
        constraints: [required]
        description: Account id (no FK constraint).

  account:
    description: Accounts.
    source:
      parquet: account.parquet
    columns:
      - name: account_id
        type: number(id)
        constraints: [required]
        description: Account id; intentionally not unique to trigger DD006.

relationships:
  - description: Each transaction belongs to one account.
    cardinality: many-to-one
    join: transaction.account_id = account.account_id

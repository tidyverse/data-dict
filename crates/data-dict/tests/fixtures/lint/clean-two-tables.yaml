# expected: lints clean. Minimal two-table dict that satisfies every rule.
# `food` keeps a table-level description; `food_category` omits it on purpose
# to exercise that `tables.<name>.description` is optional.
# `food.id` omits column-level description to exercise that it is optional.

version: "0.1.0"

tables:
  food:
    description: Foods.
    source:
      parquet: food.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
      - name: food_category_id
        type: number(id)
        constraints: [foreign_key]
        description: Category id.

  food_category:
    source:
      parquet: food_category.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        description: Category id.
      - name: name
        type: string
        constraints: [required]
        description: Category name.

relationships:
  - description: Each food belongs to one category.
    cardinality: many-to-one
    join: food.food_category_id = food_category.id

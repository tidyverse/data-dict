# expected: DD005
# `conflicts: [amount]` claims `amount` appears in both `food` and
# `food_nutrient`, but `food` has no `amount` column.

$version: "0.1.0"

tables:
  food:
    description: Foods.
    source:
      parquet: food.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        description: Food id.

  food_nutrient:
    description: Nutrient values.
    source:
      parquet: food_nutrient.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        description: Row id.
      - name: food_id
        type: number(id)
        constraints: [foreign_key]
        description: Food id.
      - name: amount
        type: number(quantity)
        description: Amount.

relationships:
  - description: Each food has many nutrient values.
    cardinality: one-to-many
    join: food.id = food_nutrient.food_id
    conflicts: [amount]

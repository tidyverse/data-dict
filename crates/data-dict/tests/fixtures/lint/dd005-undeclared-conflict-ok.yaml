# expected: lints clean. `amount` is a real column on both `food` and
# `food_nutrient` — a genuine conflict — but it is not listed in `conflicts`.
# DD005 only validates the entries that *are* declared; declaring conflicts is
# opt-in, so an undeclared shared column is not reported.

$version: "0.1.0"

tables:
  food:
    description: Foods.
    source:
      parquet: food.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        description: Food id.
        examples: [1, 2, 3, 4, 5]
      - name: amount
        type: number(quantity)
        description: Amount.
        range: [0, 1000]

  food_nutrient:
    description: Nutrient values.
    source:
      parquet: food_nutrient.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        description: Row id.
        examples: [1, 2, 3, 4, 5]
      - name: food_id
        type: number(id)
        constraints: [foreign_key]
        description: Food id.
        examples: [1, 2, 3, 4, 5]
      - name: amount
        type: number(quantity)
        description: Amount.
        range: [0, 1000]

relationships:
  - description: Each food has many nutrient values.
    cardinality: one-to-many
    join: food.id = food_nutrient.food_id

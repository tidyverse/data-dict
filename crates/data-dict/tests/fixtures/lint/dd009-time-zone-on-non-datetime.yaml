# expected: fails DD009 - `time_zone` is only valid on `datetime` columns,
# not on `date`.

version: "0.1.0"

tables:
  events:
    source:
      parquet: events.parquet
    columns:
      - name: event_day
        type: date
        time_zone: America/New_York
        range: [2020-01-01, 2024-12-31]

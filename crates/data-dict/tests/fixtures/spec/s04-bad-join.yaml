# expected: S04
# `food.food_category_id ~ food_category.id`: `~` is not a valid operator
# in the join grammar.

$version: "0.1.0"

tables:
  food:
    description: Foods.
    source:
      parquet: food.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        description: Food id.
      - name: food_category_id
        type: number(id)
        constraints: [foreign_key]
        description: Category id.

  food_category:
    description: Food categories.
    source:
      parquet: food_category.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        description: Category id.

relationships:
  - description: Each food belongs to one category.
    cardinality: many-to-one
    join: food.food_category_id ~ food_category.id

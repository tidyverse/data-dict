# expected: validates cleanly. `boolean` columns need no data representation key, so
# `is_active` is valid without `examples` (unlike other non-enum/range types).

$version: "0.1.0"

tables:
  account:
    description: Accounts.
    source:
      parquet: account.parquet
    columns:
      - name: id
        type: number(id)
        constraints: [primary_key]
        examples: [1, 2, 3, 4, 5]
      - name: is_active
        type: boolean
        description: Whether the account is active.

# Schema for data-dict.yaml documents (spec version 0.1.0).
#
# Written in the quarto-cli YAML schema dialect understood by the
# quarto-yaml-validation crate. See site/spec.md for the prose specification.
#
# Conventions in this schema:
#   - All objects are closed (`closed: true`): unknown keys are rejected.
#     This is appropriate while the spec is pre-1.0; bump the schema with the
#     spec when new fields are added.
#   - The column subschema is a single flat object. Type-specific rules
#     (e.g. `values` required for `type: enum`, `range` only valid on ordered
#     / date types) are enforced by the linter (DD007, DD008) rather than
#     structurally, to avoid repeating the same object shape for each type.
#   - Cross-table / cross-field semantics (foreign-key targets really exist,
#     `join` expressions parse, `conflicts` columns appear in both sides) are
#     out of scope for the schema and belong in a separate linter.

object:
  closed: true
  required: [version]
  properties:

    version:
      enum: [0.1.0]
      description: >
        Version of the data-dict.yaml spec this document conforms to.

    # `description` is not in site/spec.md but appears in real-world files
    # (see examples/foodbank.yaml). Allowed as optional top-level metadata;
    # may be promoted into the spec in a later version.
    description: string

    tables:
      object:
        # Keys are arbitrary table names, so no fixed `properties` — every
        # value must match the table schema.
        additionalProperties:
          object:
            closed: true
            required: [source, columns]
            properties:

              description: string
              details: string

              source:
                object:
                  closed: true
                  minProperties: 1
                  properties:
                    parquet: string
                    SQL: string
                    R: string
                    Python: string
                    pin: string

              columns:
                arrayOf:
                  object:
                    closed: true
                    required: [name]
                    properties:
                      name: string
                      description: string
                      details: string
                      type:
                        enum: ["enum", "number(ordinal)", "number(quantity)", "date",
                               "datetime", "number", "number(id)", "string", "boolean"]
                      values:
                        anyOf:
                          - arrayOf: any              # [M, F, U]
                          - object:                   # {M: Male, F: Female, ...}
                              additionalProperties: any
                      range:
                        anyOf:
                          - arrayOf:
                              schema: number
                              length: 2
                          - arrayOf:
                              schema: string
                              length: 2
                      constraints:
                        arrayOf:
                          enum: [primary_key, foreign_key, required, unique]
                      examples:
                        arrayOf: any

    relationships:
      arrayOf:
        object:
          closed: true
          required: [cardinality, join]
          properties:
            description: string
            cardinality:
              enum: [one-to-one, one-to-many, many-to-one]
            join: string
            conflicts:
              arrayOf: string

    glossary:
      object:
        additionalProperties: string
